# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/main/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  bindings.commands:
    global:
      normal:
        ',m': hint links spawn mpv {hint-url}
  completion.height:
    global: 20%
  content.javascript.clipboard:
    https://chatgpt.com: access-paste
    https://github.com: access-paste
    https://search.rhallberg.com: access-paste
  content.notifications.enabled:
    https://www.youtube.com: false
  content.register_protocol_handler:
    https://outlook.cloud.microsoft?mailtouri=%25s: true
    https://outlook.office.com?mailtouri=%25s: false
    https://outlook.office365.com?mailtouri=%25s: false
  fonts.default_size:
    global: 12pt
  fonts.web.size.default_fixed:
    global: 16
  fonts.web.size.minimum_logical:
    global: 8
  scrolling.smooth:
    global: true
  statusbar.show:
    global: in-mode
  tabs.padding:
    global:
      bottom: 7
      left: 5
      right: 5
      top: 7
  tabs.position:
    global: left
  tabs.show:
    global: always
  tabs.width:
    global: 55
